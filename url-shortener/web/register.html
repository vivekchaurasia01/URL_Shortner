<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create your account — short.do</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
<div class="page">

  <header class="site-header container">
    <a href="/" class="logo">short<span class="dot">.</span>do</a>
  </header>

  <main class="container">
    <div class="card auth-card">

      <form id="register-form" novalidate>
        <div class="auth-head">
          <h1>Create your account</h1>
          <p>Unlock an extra short URL every week.</p>
        </div>

        <div class="field">
          <label for="reg-name">Full name</label>
          <input id="reg-name" class="text-input" type="text" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input id="reg-email" class="text-input" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input id="reg-password" class="text-input" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="field">
          <label for="reg-password-confirm">Confirm password</label>
          <input id="reg-password-confirm" class="text-input" type="password" autocomplete="new-password" minlength="8" required />
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="reg-terms" required />
          <span>I agree to the Terms and Privacy policy</span>
        </label>

        <p class="field-error visible hidden" id="register-error"></p>

        <button type="submit" class="btn btn-primary btn-block" id="register-submit">Create account</button>

        <div class="divider"><span>or continue with</span></div>

        <div class="oauth-group">
          <button type="button" class="oauth-btn" id="oauth-google">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M23.5 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.47c-.28 1.5-1.13 2.77-2.4 3.62v3h3.88c2.27-2.09 3.55-5.17 3.55-8.65z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.93-2.9l-3.88-3c-1.08.72-2.45 1.15-4.05 1.15-3.11 0-5.75-2.1-6.69-4.92H1.3v3.09C3.26 21.3 7.31 24 12 24z"/><path fill="#FBBC05" d="M5.31 14.33A7.2 7.2 0 0 1 4.93 12c0-.81.14-1.6.38-2.33V6.58H1.3A12 12 0 0 0 0 12c0 1.93.46 3.76 1.3 5.42l4.01-3.09z"/><path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44C17.94 1.19 15.24 0 12 0 7.31 0 3.26 2.7 1.3 6.58l4.01 3.09C6.25 6.85 8.89 4.75 12 4.75z"/></svg>
            Continue with Google
          </button>
          <button type="button" class="oauth-btn" id="oauth-linkedin">
            <svg viewBox="0 0 24 24"><path fill="#0A66C2" d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.13 2.07 2.07 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>
            Continue with LinkedIn
          </button>
        </div>

        <p class="auth-switch">Already have an account? <a class="link-accent" href="login.html">Log in</a></p>
      </form>

      <div class="auth-state hidden" id="redirect-state">
        <div class="spinner"></div>
        <h2 id="redirect-text">Redirecting…</h2>
        <p>You'll sign in on their site, then return here.</p>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  window.SHORTDO_API_BASE = 'http://127.0.0.1:8080'; // whatever port your shortener service runs on
</script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
